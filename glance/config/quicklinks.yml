- name: ${SERVER_NAME}
  # width: slim
  hide-desktop-navigation: true
  # center-vertically: true
  # icon: si:immich # si for Simple icons https://simpleicons.org/
  # icon: sh:immich # sh for selfh.st icons https://selfh.st/icons/
  # icon: di:immich # di for Dashboard icons https://dashboardicons.com/
  # icon: mdi:camera # mdi for Material Design icons https://pictogrammers.com/library/mdi/

  head-widgets:

  - type: search
    autofocus: true
    search-engine: google
    new-tab: true

  columns:

    - size: small
      widgets:
        - type: clock
          hour-format: 24h
        - type: calendar
          first-day-of-week: monday
        - type: weather
          units: metric
          hour-format: 24h
          location: ${WEATHER_LOCATION}

    - size: full
      widgets:

        - type: monitor
          cache: 1m
          title: Management
          sites:
          - title: Home Assistant
            url: https://home.${INTERNAL_DOMAIN}
            check-url: http://${HA_GREEN_IP}:8123
            icon: di:home-assistant
          - title: File Browser
            url: https://files.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8095
            icon: di:filebrowser
          - title: Portainer
            url: https://docker.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:9443
            icon: di:portainer
            alt-status-codes:
              - 403
              - 401
              - 400

        - type: monitor
          cache: 1m
          title: Documents
          sites:
          - title: Paperless-ngx
            url: https://paperless.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8010
            icon: di:paperless
          - title: Seafile
            url: https://drive.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8011
            icon: di:seafile
          - title: Immich
            url: https://immich.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:5055
            icon: di:immich

        - type: monitor
          cache: 1m
          title: Media
          sites:
          - title: Jellyfin
            url: https://jellyfin.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8096
            icon: di:jellyfin
          - title: Seerr
            url: https://seerr.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:5055
            icon: di:seerr
          - title: MeTube
            url: https://metube.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8081
            icon: di:metube

        - type: monitor
          cache: 1m
          title: Download Clients
          sites:
          - title: qBittorrent
            url: https://torrent.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8080
            icon: di:qbittorrent

          - title: NZBGet
            url: https://nzbget.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:6789
            icon: di:nzbget
            alt-status-codes:
              - 403
              - 401
          - title: Prowlarr
            url: https://prowlarr.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:9696
            icon: di:prowlarr

        - type: monitor
          cache: 1m
          title: ARR Suite
          sites:
          - title: Radarr (movies)
            url: https://radarr.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:7878
            icon: di:radarr
          - title: Sonarr (series)
            url: https://sonarr.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8989
            icon: di:sonarr
          - title: Bazarr (subtitles)
            url: https://bazarr.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:6767
            icon: di:bazarr
        
        - type: monitor
          cache: 1m
          title: Monitoring
          sites:
          - title: Beszel
            url: https://monitoring.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8090
            icon: di:beszel
          - title: Speedtest Tracker
            url: https://speedtest.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:8472
            icon: di:myspeed
          - title: Cockpit
            url: https://cockpit.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:9090
            allow-insecure: true
            icon: di:cockpit
            alt-status-codes:
              - 403
              - 401
              - 301

        - type: monitor
          cache: 1m
          title: Networking
          sites:
          - title: Livebox
            url: http://${LIVEBOX_IP}
            icon: di:orange
          - title: Pi-hole
            url: https://pihole.${INTERNAL_DOMAIN}/admin
            check-url: http://${PI_ZERO_IP}/admin
            icon: di:pi-hole
          - title: NGINX Proxy Manager
            url: https://proxy.${INTERNAL_DOMAIN}
            check-url: http://${SERVER_IP}:81
            icon: di:nginx-proxy-manager 
        

    - size: small
      widgets:


      - type: server-stats
        servers:
          - type: local
            name: ${SERVER_NAME}
            hide-swap: true
            hide-mountpoints-by-default: true
            mountpoints:
              "/data":
                name: SSD
                hide: false
              "/app/config":
                name: Root
                hide: false
              "/tank/immich":
                name: "Tank: Photos"
                hide: false
              "/tank/seafile":
                name: "Tank: Cloud"
                hide: false
      - type: dns-stats
        service: pihole-v6
        hour-format: 24h
        url: https://pihole.${INTERNAL_DOMAIN}
        password: ${PIHOLE_PASSWORD}

      - type: custom-api
        title: Mullvad Status
        cache: 1m
        url: https://am.i.mullvad.net/json
        template: |
          <div>
            <div>
              <div>
                {{ $connected := (.JSON.Bool "mullvad_exit_ip") }}
                {{ $ip := (.JSON.String "ip") }}
                {{ $city := (.JSON.String "city") }}
                {{ $country := (.JSON.String "country") }}
                {{ if $connected }}
                  <div class="color-highlight size-h3">
                    Your VPN is connected!
                    <span class="color-positive">●</span> 
                  </div>
                {{ else }}
                  <div class="color-highlight size-h3">
                    Your VPN is not connected!
                    <span class="color-negative">●</span> 
                  </div>
                {{ end }}
              </div>
              <div class="size-h5">{{ $ip }} - {{ $city }}, {{ $country }}</div>
            </div>
          </div>

      - type: custom-api
        title: Gluetun status
        cache: 1m
        url: http://${GLUETUN_URL}/v1/publicip/ip
        headers:
          X-API-Key: ${GLUETUN_API_KEY}
        template: |
          {{ if eq .Response.StatusCode 200 }}
            {{ $ip := (.JSON.String "public_ip") }}
            {{ $city := (.JSON.String "city") }}
            {{ $country := (.JSON.String "country") }}
            {{ if eq $ip "" }}
              <div>
                <div>
                  <div>
                    <div class="color-highlight size-h3">
                      Your VPN is not connected!
                      <span class="color-negative">●</span> 
                    </div>
                  </dv>
                </div>
              </div>
            {{ else }}
              <div>
                <div>
                  <div>
                    <div class="color-highlight size-h3">
                      Your VPN is connected!
                      <span class="color-positive">●</span> 
                    </div>
                  </div>
                  <div class="size-h5">{{ $ip }} - {{ $city }}, {{ $country }}</div>
                </div>
              </div>
            {{ end }}
          {{ else }}
            <div style="text-align: center; color: var(--color-negative);">
              Error: {{ .Response.StatusCode }} - {{ .Response.Status }}
            </div>
          {{ end }}

      - type: custom-api
        cache: 1h
        title: Internet Speed
        title-url: ${SPEEDTEST_URL}
        url: ${SPEEDTEST_URL}/api/v1/results/latest
        headers:
          Authorization: Bearer ${SPEEDTEST_TRACKER_API_TOKEN}
          Accept: application/json
        subrequests:
          stats:
            url: ${SPEEDTEST_URL}/api/v1/stats
            headers:
              Authorization: Bearer ${SPEEDTEST_TRACKER_API_TOKEN}
              Accept: application/json
        options:
          showPercentageDiff: true
        template: |
          {{ $showPercentage := .Options.BoolOr "showPercentageDiff" true }}

          {{ $stats := .Subrequest "stats" }}
          <div class="flex justify-between text-center margin-block-3">
          <div>
              {{ $downloadChange := percentChange (.JSON.Float "data.download_bits") ($stats.JSON.Float "data.download.avg_bits")
              }}
              {{ if $showPercentage }}
              <div
              class="size-small {{ if gt $downloadChange 0.0 }}color-positive{{ else if lt $downloadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}"
              style="display: inline-flex; align-items: center;">
              {{ $downloadChange | printf "%+.1f%%" }}
              {{ if gt $downloadChange 0.0 }}
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                  style="height: 1em; margin-left: 0.25em;" class="size-4">
                  <path fill-rule="evenodd"
                  d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                  clip-rule="evenodd" />
              </svg>
              {{ else if lt $downloadChange 0.0 }}
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                  style="height: 1em; margin-left: 0.25em;" class="size-4">
                  <path fill-rule="evenodd"
                  d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                  clip-rule="evenodd" />
              </svg>
              {{ end }}
              </div>
              {{ end }}
              <div class="color-highlight size-h3">{{ .JSON.Float "data.download_bits" | mul 0.000001 | printf "%.1f" }}</div>
              <div class="size-h6">DOWNLOAD</div>
          </div>
          <div>
              {{ $uploadChange := percentChange (.JSON.Float "data.upload_bits") ($stats.JSON.Float "data.upload.avg_bits") }}
              {{ if $showPercentage }}
              <div
              class="size-small {{ if gt $uploadChange 0.0 }}color-positive{{ else if lt $uploadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}"
              style="display: inline-flex; align-items: center;">
              {{ $uploadChange | printf "%+.1f%%" }}
              {{ if gt $uploadChange 0.0 }}
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                  style="height: 1em; margin-left: 0.25em;" class="size-4">
                  <path fill-rule="evenodd"
                  d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                  clip-rule="evenodd" />
              </svg>
              {{ else if lt $uploadChange 0.0 }}
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                  style="height: 1em; margin-left: 0.25em;" class="size-4">
                  <path fill-rule="evenodd"
                  d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                  clip-rule="evenodd" />
              </svg>
              {{ end }}
              </div>
              {{ end }}
              <div class="color-highlight size-h3">{{ .JSON.Float "data.upload_bits" | mul 0.000001 | printf "%.1f" }}</div>
              <div class="size-h6">UPLOAD</div>
          </div>
          <div>
              {{ $pingChange := percentChange (.JSON.Float "data.ping") ($stats.JSON.Float "data.ping.avg") }}
              {{ if $showPercentage }}
              <div
              class="size-small {{ if gt $pingChange 0.0 }}color-negative{{ else if lt $pingChange 0.0 }}color-positive{{ else }}color-primary{{ end }}"
              style="display: inline-flex; align-items: center;">
              {{ $pingChange | printf "%+.1f%%" }}
              {{ if lt $pingChange 0.0 }}
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                  style="height: 1em; margin-left: 0.25em;" class="size-4">
                  <path fill-rule="evenodd"
                  d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z"
                  clip-rule="evenodd" />
              </svg>
              {{ else if gt $pingChange 0.0 }}
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                  style="height: 1em; margin-left: 0.25em;" class="size-4">
                  <path fill-rule="evenodd"
                  d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z"
                  clip-rule="evenodd" />
              </svg>
              {{ end }}
              </div>
              {{ end }}
              <div class="color-highlight size-h3">{{ .JSON.Float "data.ping" | printf "%.0f ms" }}</div>
              <div class="size-h6">PING</div>
          </div>
          </div>

      - type: custom-api
        title: Prowlarr Indexers
        cache: 1m
        options:
          url: "${PROWLARR_URL}"
          base-url: ${PROWLARR_API_URL}
          api-key: ${PROWLARR_KEY}
          collapse-after: ${PROWLARR_COLLAPSE_AFTER}
        template: |
          {{ $apiBaseUrl := .Options.StringOr "base-url" "" }}
          {{ $key := .Options.StringOr "api-key" "" }}
          {{ $url := .Options.StringOr "url" "" }}
          {{ $collapseAfter := .Options.IntOr "collapse-after" 5 }}

          {{ if or (eq $apiBaseUrl "") (eq $key "") (eq $url "") }}
            <div class="widget-error-header">
                <div class="color-negative size-h3">ERROR</div>
                <svg class="widget-error-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"></path>
                </svg>
              </div>
              <p class="break-all">
                Some options are not set or malformed
                  <table style="border-spacing: 1rem;">
                    <tr>
                      <td><strong>PROWLARR_URL & PROWLARR_API_URL</strong> <br/> should include http(s):// and port if needed</td>
                    </tr>
                    <tr>
                      <td><strong>PROWLARR_KEY</strong> <br/> must be set (Settings > General > Security)</td>
                    </tr>
                  </table> 
              </p>
          {{ else }}

            {{ $indexUrl := printf "%s/api/v1/indexer" $apiBaseUrl }}

            {{ $indexData := newRequest $indexUrl
              | withHeader "Accept" "application/json"
              | withHeader "X-Api-Key" $key
              | getResponse }}

            {{ if eq $indexData.Response.StatusCode 200 }}
              <style>
                .prowlarr-indexers .prowlarr-index-item
                {
                  align-items: center;        
                }
                .prowlarr-indexers .prowlarr-index-item > span{
                  text-transform: capitalize;
                  background: var(--color-background);
                  padding: 0.2rem 0.75rem;
                  border: 1px solid var(--color-widget-content-border);
                  border-radius: var(--border-radius);
                  font-size: var(--font-size-tiny);
                }
              </style>
        
              <ul class="prowlarr-indexers list list-gap-10 collapsible-container" data-collapse-after="{{ $collapseAfter }}">

                {{ range $indexData.JSON.Array "" }}
                  {{ $isEnabled := .String "enable" }}
            
                  <li class="flex items-center gap-12 prowlarr-index-item">
                    <a href="{{ $url }}" target="_blank" class="size-title-dynamic color-highlight text-truncate block grow">{{ .String "name" }}</a>
                    <span>{{ .String "privacy" }}</span>
                    {{ if eq $isEnabled "true" }}
                      <div class="margin-left-auto shrink-0" data-popover-type="text" data-popover-position="above" data-popover-text="Enabled" aria-label="Enabled">
                        <div class="monitor-site-status-icon-compact" title="Enabled">
                          <svg fill="var(--color-positive)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"></path>
                          </svg>
                        </div>
                      </div>
                    {{ else }}
                      <div class="margin-left-auto shrink-0" data-popover-type="text" data-popover-position="above" data-popover-text="Disabled" aria-label="Disabled">
                        <div class="monitor-site-status-icon-compact" title="Disabled">
                          <svg fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"></path>
                          </svg>
                        </div>
                      </div>
                    {{ end }}
                    
                  </li>
                {{ end }}

              </ul>
            {{ else }}
              <p>Failed to fetch data (Status: {{ $indexData.Response.StatusCode }})</p>
            {{ end }}

          {{ end }}