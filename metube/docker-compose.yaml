services:
  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - /data/youtube:/downloads
    environment:
      - DELETE_FILE_ON_TRASHCAN=true
      - MAX_CONCURRENT_DOWNLOADS=1
      - DOWNLOAD_DIRS_INDEXABLE=true
    